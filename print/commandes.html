<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Empreinte — Commandes (créateur)</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>" />

<!--
  Dashboard créateur d'Empreinte : liste les commandes payées (lues depuis Stripe via
  api/pay/print-orders) et génère un « bon de fabrication » imprimable en PDF pour chaque
  commande (filament, paramètres, fichier, adresse). Accès protégé par un token créateur
  (env EMPREINTE_ADMIN_TOKEN), saisi une fois et conservé en local.
-->

<style>
  :root { --bg:#0b0f17; --panel:#121926; --panel-2:#0e1420; --line:#1e293b; --line-2:#263349;
          --text:#e6edf6; --muted:#94a3b8; --muted-2:#64748b; --accent:#3b82f6; --good:#22c55e; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
         color:var(--text); background:var(--bg); -webkit-font-smoothing:antialiased; }
  a { color:#60a5fa; }
  header.top { display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:14px 20px; border-bottom:1px solid var(--line); position:sticky; top:0; z-index:5;
    background:rgba(11,15,23,.8); backdrop-filter:blur(10px); }
  .brand { display:flex; align-items:center; gap:10px; font-weight:700; }
  .brand .logo { width:30px; height:30px; border-radius:9px; display:grid; place-items:center;
    background:linear-gradient(135deg,var(--accent),#7c3aed); color:#fff; font-size:16px; }
  .brand small { display:block; font-weight:500; color:var(--muted); font-size:11px; }
  .ghost { background:transparent; border:1px solid var(--line-2); color:var(--muted);
    padding:8px 12px; border-radius:10px; cursor:pointer; font-size:13px; }
  .ghost:hover { color:var(--text); border-color:var(--accent); }
  main { max-width:1080px; margin:0 auto; padding:20px; }

  /* connexion */
  .gate { max-width:400px; margin:12vh auto; text-align:center; }
  .gate .logo-big { font-size:44px; }
  .gate h1 { font-size:20px; margin:8px 0 4px; }
  .gate p { color:var(--muted); font-size:14px; }
  .gate input { width:100%; margin:14px 0 10px; background:var(--panel-2); border:1px solid var(--line);
    color:var(--text); border-radius:10px; padding:11px 13px; font:inherit; }
  .gate button { width:100%; border:0; border-radius:10px; padding:12px; font-weight:700; color:#fff;
    background:linear-gradient(135deg,var(--accent),#7c3aed); cursor:pointer; font-size:15px; }
  .gate .err { color:#f87171; font-size:13px; min-height:18px; margin-top:8px; }

  .toolbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .toolbar h2 { margin:0; font-size:16px; }
  .count { color:var(--muted); font-size:13px; }

  .order { background:var(--panel); border:1px solid var(--line); border-radius:14px; margin-bottom:14px; overflow:hidden; }
  .order .oh { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; padding:14px 16px; border-bottom:1px solid var(--line); }
  .order .oh .who { font-weight:600; }
  .order .oh .meta { color:var(--muted); font-size:12px; margin-top:2px; }
  .order .oh .total { text-align:right; }
  .order .oh .total .amt { font-size:20px; font-weight:800; }
  .order .oh .total .ship { color:var(--muted); font-size:12px; }
  .order .ob { display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:14px 16px; }
  @media (max-width:680px){ .order .ob { grid-template-columns:1fr; } }
  .block h4 { margin:0 0 8px; font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); }
  .kv { display:flex; justify-content:space-between; gap:10px; padding:3px 0; font-size:14px; border-bottom:1px dashed var(--line); }
  .kv .k { color:var(--muted); } .kv .v { text-align:right; font-variant-numeric:tabular-nums; }
  .addr { font-size:14px; line-height:1.6; }
  .of { display:flex; gap:8px; padding:12px 16px; border-top:1px solid var(--line); flex-wrap:wrap; }
  .btn { border:0; border-radius:10px; padding:9px 14px; font-weight:600; cursor:pointer; font-size:13px; }
  .btn.primary { background:var(--accent); color:#fff; }
  .btn.sec { background:var(--panel-2); color:var(--text); border:1px solid var(--line-2); }
  .btn.sec:hover { border-color:var(--accent); }
  .pill { font-size:11px; padding:3px 8px; border-radius:999px; background:var(--panel-2); border:1px solid var(--line-2); color:var(--muted); }
  .empty { text-align:center; color:var(--muted); padding:60px 20px; }
  .nofile { color:#fbbf24; font-size:12px; align-self:center; }
  .toast { position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:var(--panel);
    border:1px solid var(--line-2); color:var(--text); padding:12px 18px; border-radius:12px; z-index:100;
    font-size:14px; opacity:0; pointer-events:none; transition:opacity .2s; }
  .toast.show { opacity:1; }
  .hidden { display:none !important; }

  /* ---- Bon de fabrication imprimable (A4) ---- */
  #print-sheet { display:none; }
  @media print {
    body { background:#fff; }
    body > *:not(#print-sheet) { display:none !important; }
    #print-sheet { display:block; color:#111; padding:0; }
  }
  #print-sheet .sheet { color:#111; background:#fff; font-size:13px; }
  #print-sheet .ps-head { display:flex; justify-content:space-between; align-items:flex-start;
    border-bottom:3px solid #111; padding-bottom:12px; margin-bottom:16px; }
  #print-sheet .ps-brand { font-size:22px; font-weight:800; letter-spacing:.5px; }
  #print-sheet .ps-brand small { display:block; font-size:11px; font-weight:500; color:#555; letter-spacing:1px; }
  #print-sheet .ps-ref { text-align:right; font-size:12px; color:#333; }
  #print-sheet .ps-cols { display:flex; gap:24px; }
  #print-sheet .ps-col { flex:1; }
  #print-sheet h3 { font-size:12px; text-transform:uppercase; letter-spacing:1px; color:#666;
    border-bottom:1px solid #ccc; padding-bottom:4px; margin:0 0 8px; }
  #print-sheet .row { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px dotted #ddd; }
  #print-sheet .row .k { color:#555; } #print-sheet .row .v { font-weight:600; }
  #print-sheet .addr { line-height:1.7; font-size:14px; }
  #print-sheet .ps-total { margin-top:18px; border:2px solid #111; border-radius:8px; padding:12px 16px;
    display:flex; justify-content:space-between; align-items:center; }
  #print-sheet .ps-total .lbl { font-weight:600; } #print-sheet .ps-total .amt { font-size:24px; font-weight:800; }
  #print-sheet .ps-foot { margin-top:20px; font-size:11px; color:#777; border-top:1px solid #ccc; padding-top:10px; }
  #print-sheet .ps-file { margin-top:14px; padding:10px 12px; background:#f4f6fa; border:1px solid #dde3ec; border-radius:8px; font-size:12px; word-break:break-all; }
</style>

<!-- ---------- Connexion ---------- -->
<div id="gate" class="gate">
  <div class="logo-big">◈</div>
  <h1>Empreinte — Espace créateur</h1>
  <p>Entre ton token d'accès pour voir les commandes.</p>
  <input type="password" id="token-input" placeholder="Token créateur" autocomplete="current-password" />
  <button id="login-btn">Accéder aux commandes</button>
  <div class="err" id="gate-err"></div>
</div>

<!-- ---------- Dashboard ---------- -->
<div id="app" class="hidden">
  <header class="top">
    <div class="brand"><span class="logo">◈</span><div>Empreinte <small>Espace créateur</small></div></div>
    <div style="display:flex;gap:8px">
      <button class="ghost" id="refresh-btn">↻ Actualiser</button>
      <button class="ghost" id="logout-btn">Déconnexion</button>
    </div>
  </header>
  <main>
    <div class="toolbar">
      <h2>Commandes payées</h2>
      <span class="count" id="count"></span>
    </div>
    <div id="orders"></div>
  </main>
</div>

<div id="print-sheet"></div>
<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);
const TOKEN_KEY = 'empreinte_admin_token';
let ORDERS = [];

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtEUR(cents, cur){ return (cents/100).toLocaleString('fr-FR',{style:'currency',currency:(cur||'eur').toUpperCase()}); }
function fmtDate(ts){ return new Date(ts*1000).toLocaleString('fr-FR',{dateStyle:'medium',timeStyle:'short'}); }
let toastTimer; function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2600); }

/* ---------- connexion ---------- */
async function login(token){
  $('#gate-err').textContent = '';
  try {
    const r = await fetch('/api/pay/print-orders', { headers:{ 'x-admin-token': token } });
    const d = await r.json().catch(()=>({}));
    if (!r.ok) { $('#gate-err').textContent = d.error || 'Accès refusé.'; return false; }
    localStorage.setItem(TOKEN_KEY, token);
    ORDERS = d.orders || [];
    $('#gate').classList.add('hidden'); $('#app').classList.remove('hidden');
    renderOrders();
    return true;
  } catch(e){ $('#gate-err').textContent = 'Connexion impossible.'; return false; }
}
async function refresh(){
  const token = localStorage.getItem(TOKEN_KEY); if (!token) return;
  try {
    const r = await fetch('/api/pay/print-orders', { headers:{ 'x-admin-token': token } });
    const d = await r.json().catch(()=>({}));
    if (!r.ok){ toast(d.error||'Erreur'); return; }
    ORDERS = d.orders || []; renderOrders(); toast('Commandes à jour ✓');
  } catch { toast('Connexion impossible.'); }
}
$('#login-btn').addEventListener('click', ()=> login($('#token-input').value.trim()));
$('#token-input').addEventListener('keydown', e => { if (e.key==='Enter') login(e.target.value.trim()); });
$('#refresh-btn').addEventListener('click', refresh);
$('#logout-btn').addEventListener('click', ()=>{ localStorage.removeItem(TOKEN_KEY); location.reload(); });

/* ---------- rendu des commandes ---------- */
function addrLines(a){
  if (!a) return '<span class="nofile">Adresse non fournie</span>';
  return [ a.line1, a.line2, [a.postal_code, a.city].filter(Boolean).join(' '), [a.state, a.country].filter(Boolean).join(', ') ]
    .filter(Boolean).map(esc).join('<br>');
}
function renderOrders(){
  $('#count').textContent = ORDERS.length ? `${ORDERS.length} commande${ORDERS.length>1?'s':''}` : '';
  if (!ORDERS.length){ $('#orders').innerHTML = '<div class="empty">Aucune commande payée pour l’instant.</div>'; return; }
  $('#orders').innerHTML = ORDERS.map((o,i)=>{
    const m = o.metadata||{};
    const fileBtn = m.fileUrl
      ? `<a class="btn primary" href="${esc(m.fileUrl)}" target="_blank" rel="noopener">⬇︎ Fichier STL</a>`
      : `<span class="nofile">⚠︎ Fichier non joint</span>`;
    return `<div class="order">
      <div class="oh">
        <div>
          <div class="who">${esc(o.name||o.email||'Client')}</div>
          <div class="meta">${esc(fmtDate(o.created))} · ${esc(o.email||'')}${o.phone?' · '+esc(o.phone):''}</div>
        </div>
        <div class="total">
          <div class="amt">${fmtEUR(o.amountTotal,o.currency)}</div>
          <div class="ship">${o.amountShipping? 'dont port '+fmtEUR(o.amountShipping,o.currency):'livraison offerte'}</div>
        </div>
      </div>
      <div class="ob">
        <div class="block">
          <h4>Fabrication</h4>
          <div class="kv"><span class="k">Filament</span><span class="v">${esc(m.filament||'—')}</span></div>
          <div class="kv"><span class="k">Buse / Plateau</span><span class="v">${esc(m.nozzle||'?')}°C / ${esc(m.bed||'?')}°C</span></div>
          <div class="kv"><span class="k">Remplissage / Parois</span><span class="v">${esc(m.infill||'?')}% / ${esc(m.walls||'3')}</span></div>
          <div class="kv"><span class="k">Matière / Temps</span><span class="v">${esc(m.grams||'?')} g · ${esc(m.minutes||'?')} min</span></div>
          <div class="kv"><span class="k">Dimensions</span><span class="v">${esc(m.dims||'—')} mm</span></div>
          <div class="kv"><span class="k">Fichier</span><span class="v">${esc(m.fileName||'—')} ${m.exact==='true'?'<span class="pill">slicing exact</span>':''}</span></div>
        </div>
        <div class="block">
          <h4>Livraison</h4>
          <div class="addr">${esc(o.name||'')}<br>${addrLines(o.address)}</div>
        </div>
      </div>
      <div class="of">
        <button class="btn sec" onclick="printOrder(${i})">🧾 Bon de fabrication (PDF)</button>
        ${fileBtn}
        <span class="pill" style="align-self:center">${esc(m.priceBreakdown||'')}</span>
      </div>
    </div>`;
  }).join('');
}

/* ---------- bon de fabrication imprimable ---------- */
function printOrder(i){
  const o = ORDERS[i]; if (!o) return; const m = o.metadata||{};
  $('#print-sheet').innerHTML = `<div class="sheet">
    <div class="ps-head">
      <div class="ps-brand">◈ EMPREINTE<small>BON DE FABRICATION</small></div>
      <div class="ps-ref">Commande ${esc(o.id.slice(-10))}<br>${esc(fmtDate(o.created))}</div>
    </div>
    <div class="ps-cols">
      <div class="ps-col">
        <h3>Fabrication</h3>
        <div class="row"><span class="k">Fichier</span><span class="v">${esc(m.fileName||'—')}</span></div>
        <div class="row"><span class="k">Filament</span><span class="v">${esc(m.filament||'—')}</span></div>
        <div class="row"><span class="k">Température buse</span><span class="v">${esc(m.nozzle||'?')} °C</span></div>
        <div class="row"><span class="k">Température plateau</span><span class="v">${esc(m.bed||'?')} °C</span></div>
        <div class="row"><span class="k">Remplissage</span><span class="v">${esc(m.infill||'?')} %</span></div>
        <div class="row"><span class="k">Parois</span><span class="v">${esc(m.walls||'3')}</span></div>
        <div class="row"><span class="k">Matière</span><span class="v">${esc(m.grams||'?')} g</span></div>
        <div class="row"><span class="k">Temps d’impression</span><span class="v">${esc(m.minutes||'?')} min</span></div>
        <div class="row"><span class="k">Dimensions</span><span class="v">${esc(m.dims||'—')} mm</span></div>
        ${m.fileUrl?`<div class="ps-file">Fichier STL : ${esc(m.fileUrl)}</div>`:'<div class="ps-file">⚠︎ Fichier non joint à la commande.</div>'}
      </div>
      <div class="ps-col">
        <h3>Livraison</h3>
        <div class="addr"><strong>${esc(o.name||'')}</strong><br>${addrLines(o.address)}</div>
        <h3 style="margin-top:16px">Contact</h3>
        <div class="row"><span class="k">Email</span><span class="v">${esc(o.email||'—')}</span></div>
        <div class="row"><span class="k">Téléphone</span><span class="v">${esc(o.phone||'—')}</span></div>
      </div>
    </div>
    <div class="ps-total">
      <span class="lbl">Total payé${o.amountShipping?` (dont ${fmtEUR(o.amountShipping,o.currency)} de port)`:' — livraison offerte'}</span>
      <span class="amt">${fmtEUR(o.amountTotal,o.currency)}</span>
    </div>
    <div class="ps-foot">${esc(m.priceBreakdown||'')} — Empreinte, impression 3D à la demande. Document généré le ${esc(new Date().toLocaleString('fr-FR'))}.</div>
  </div>`;
  window.print();
}

/* ---------- démarrage : token déjà enregistré ? ---------- */
(function(){
  const t = localStorage.getItem(TOKEN_KEY);
  if (t) login(t); else $('#token-input').focus();
})();
</script>
